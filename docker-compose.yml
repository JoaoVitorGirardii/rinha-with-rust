services:
  haproxy:
    image: haproxy:3.0-alpine
    ports:
      - "9999:9999"
    volumes:
      - ./haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
      - sockets:/sockets
    depends_on:
      api-1:
        condition: service_healthy
      api-2:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.1"
          memory: "10MB"

  api-1:
    build: .
    environment:
      VPTREE_PATH: /data/vptree.bin
      SOCKET_PATH: /sockets/api1.sock
    volumes:
      - sockets:/sockets
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/ready || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: "0.45"
          memory: "170MB"

  api-2:
    build: .
    environment:
      VPTREE_PATH: /data/vptree.bin
      SOCKET_PATH: /sockets/api2.sock
    volumes:
      - sockets:/sockets
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/ready || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: "0.45"
          memory: "170MB"

volumes:
  sockets:
